name: Auto-update Antigravity CLI package

# Checks daily for a new Antigravity CLI release (via the winget-pkgs manifest),
# and if found: updates the package files, packs, pushes to the Chocolatey
# community feed, and commits the version bump back to this repo.
#
# Requires one repository secret: CHOCO_API_KEY (your push API key from
# https://community.chocolatey.org/account).

on:
  schedule:
    - cron: '0 7 * * *'    # daily at 07:00 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

jobs:
  update:
    runs-on: windows-latest
    permissions:
      contents: write       # to commit the version bump back
    steps:
      - uses: actions/checkout@v4

      - name: Update, pack, and push if a new version exists
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: ./update.ps1 -Push

      - name: Commit the version bump back to the repo
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add antigravity-cli.nuspec tools/chocolateyinstall.ps1 tools/VERIFICATION.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
              Write-Host "No version change to commit."
          } else {
              $v = ([xml](Get-Content antigravity-cli.nuspec)).package.metadata.version
              git commit -m "Update Antigravity CLI to $v"
              git push
          }
